<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="index.js" defer></script>
    <title>Calculator</title>
  </head>
  <body>
    <div class="container">
      <div class="screen-container"></div>
      <div class="top-buttons">
        <button>Clear</button>
        <button>Delete</button>
      </div>
      <div class="main-content">
        <div class="numbers">
          <button class="numbers-btn">7</button>
          <button class="numbers-btn">8</button>
          <button class="numbers-btn">9</button>
          <button class="numbers-btn">4</button>
          <button class="numbers-btn">5</button>
          <button class="numbers-btn">6</button>
          <button class="numbers-btn">1</button>
          <button class="numbers-btn">2</button>
          <button class="numbers-btn">3</button>
          <button class="numbers-btn">.</button>
          <button class="numbers-btn">0</button>
          <button class="numbers-btn">=</button>
        </div>
        <div class="signs">
          <button class="numbers-btn">÷</button>
          <button class="numbers-btn">ⅹ</button>
          <button class="numbers-btn">-</button>
          <button class="numbers-btn">+</button>
        </div>
      </div>
    </div>
  </body>
</html>
